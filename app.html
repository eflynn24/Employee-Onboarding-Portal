<!DOCTYPE html>
<html lang="en" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple HTML App</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4f46e5, #0ea5e9);
      color: #111827;
    }
    .app {
      background: #ffffffee;
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.2);
      width: min(100%, 620px);
      max-width: 640px;
      padding: 32px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 2rem;
      color: #111827;
    }
    p {
      margin: 0 0 24px;
      line-height: 1.6;
      color: #4b5563;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 16px 18px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.15);
    }
    .primary { background: #3b82f6; color: white; }
    .secondary { background: #e2e8f0; color: #1f2937; }
    .output {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 20px;
      min-height: 120px;
      font-size: 1rem;
      line-height: 1.6;
      color: #111827;
      white-space: pre-wrap;
    }
  </style>

<mso:_ApprovalStatus msdt:dt="string">0</mso:_ApprovalStatus>

</mso:CustomDocumentProperties>

</head>
<body>
  <div class="app">
    <h1>Interactive HTML App</h1>
    <p>Click the buttons below to generate content, view the current time, or reset the output area.</p>
    <div class="controls">
      <button class="primary" id="showMessage">Show Message</button>
      <button class="secondary" id="showTime">Show Current Time</button>
      <button class="secondary" id="showRandom">Show Random Tip</button>
      <button class="secondary" id="resetOutput">Reset</button>
    </div>
    <div class="output" id="output">Ready. Use the buttons above to interact with the app.</div>
  </div>
  <script>
    const output = document.getElementById('output');
    const tips = [
      'Keep your code clean by using descriptive names.',
      'Use responsive layouts so your app looks great on all screens.',
      'Test your app often to catch issues early.',
      'Write comments for complex logic to make it easier to understand.',
      'Use the browser console to inspect errors and debug quickly.'
    ];

    document.getElementById('showMessage').addEventListener('click', () => {
      output.textContent = 'Hello! This is a simple HTML app with interactive buttons. You can extend it with forms, charts, or data from APIs.';
    });

    document.getElementById('showTime').addEventListener('click', () => {
      const now = new Date();
      output.textContent = `Current time: ${now.toLocaleTimeString()} on ${now.toLocaleDateString()}`;
    });

    document.getElementById('showRandom').addEventListener('click', () => {
      const tip = tips[Math.floor(Math.random() * tips.length)];
      output.textContent = `Web dev tip:\n\n${tip}`;
    });

    document.getElementById('resetOutput').addEventListener('click', () => {
      output.textContent = 'Ready. Use the buttons above to interact with the app.';
    });
  </script>
</body>
</html>
